body:
  text: 古刻叢鈔目録類二金石之屬提要臣等謹案古刻叢鈔一卷明陶宗儀編宗儀有國風尊經已著録是編前後無序跋所鈔碑刻凡七十二種漢一後漢二晉一宋三梁三隋一唐四十九南唐一北宋二南宋一無年月者六皆全録其文以原額為題無所考辨亦無先後次序蓋隨得隨抄非著書也然所載諸碑傳於世者甚罕惟漢建平郫縣刻石見於隸續漢𨽻字源唐薛王府典軍李無慮墓志見於金石録其餘如宋之臨澧侯劉襲墓志梁之永陽敬太妃王氏墓志唐之汝南公主墓志尉州刺史馬紓墓志多與史傳相發明又載唐人曹汾等别東林寺徐浩題寶林寺及謁禹廟釋元孚與王謨遊天台詩共七首亦自來録唐詩者所未及古人著作托金石以垂于後然金石有時而銷泐其幸而存者不貴存目貴録其文而後可傳於無窮故洪適𨽻釋𨽻續較金石集古諸録更為有資於考證是書托拾佚文首尾完具非惟補金石家之缺漏即讀史談藝亦均為有所禆矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cec7bd7bc175653303c583029f6934e6d8464957087bb495759fa73d2b86dd18
