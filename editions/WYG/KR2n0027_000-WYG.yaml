body:
  text: 古刻叢鈔目錄類二金石之屬提要臣等謹案古刻叢鈔一卷明陶宗儀編宗儀有國風尊經已著録是編前後無序跋所鈔碑刻凡七十二種漢一後漢二晉一宋三梁三隋一唐四十九南唐一北宋二南宋一無年月者六皆全録其文以原額為題無所考辨亦無先後次序葢隨得隨抄非著書也然所載諸碑傳於世者甚罕惟漢建平郫縣刻石見於隷續漢𨽻字源唐薛王府典軍李無慮墓誌見於金石録其餘如宋之臨澧侯劉襲墓誌梁之永陽敬太妃王氏墓誌唐之汝南公主墓誌尉州刺史馬紓墓誌多與史傳相發明又載唐人曹汾等别東林寺徐浩題寳林寺及謁禹廟釋元孚與王謩遊天台詩共七首亦自來錄唐詩者所未及古人著作托金石以垂于後然金石有時而銷泐其幸而存者不貴存目貴錄其文而後可傳於無窮故洪适𨽻釋𨽻續較金石集古諸錄更為有資於考證是書摭拾佚文首尾完具非惟補金石家之缺漏即讀史談藝亦均為有所禆矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:408f4ae3d5be2540328a36c4613b601e3125acc22512ef20571df0a32a9a7e9e
