  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0027_WYG_001-1a, image: WYG0683/WYG0683-0002c.png}
body:
  text: 古刻叢鈔明陶宗儀編大唐故陪戎校尉崔府君墓誌銘并序名闕撰人君諱相清河人也神農之苖冑太公之𦙍緒原夫魚吞吕釣應同載以歸周龍躍崔津表嘉名以誕慶曽祖懷隋任鄭州司馬祖􅂒父觀隋任豪州録事叅軍或六條布政揚至德以宣風或千里輔仁翊公平以闡化君髙門華緒間代清姿猗桐吸日月之光松栢挺風霜之節方冀南山錫壽永駐頺齡何期北帝遊魂先悲過隙嗚呼哀哉以開元十年二月廿一日終於私第春秋六十有八夫人丁氏蘇氏李氏並母儀婉順婦德蕙和移隣之慶早彰舉案之驩夙備庶期千月壽保百齡冀椿鶴而齊年奄菌蝣而等謝越開元十年三月八日合袝於村西北二里平原禮也左滎澤右成臯峨峨飛嶠鎮其前滔滔黄河灌其後嗟乎玉樹雙埋金聲兩絶白日杳而三千歳黄泉深而幾萬重悲風起而松栢哀冷露泫而蓬蒿泣嗣子待賔等瞻天靡訴叩地無追長縈銜索之悲永結飱茶之苦銘曰東光不駐西影彌催崐山玉碎蘭苑香摧𤣥霄易掩白日難開母儀夙備婦德早彰匣中劔折鏡裏鸞亡乾坤載合琴瑟重張森森翠栢騷騷白楊千秋播馥萬代流芳大唐故忠武將軍行薛王府典軍上柱國平棘縣開國男李府君墓誌銘并序撰賈彦璿君諱無慮字忠眷隴西人也昔月貫於􅄧咎繇誕而邁徳氣感流星伯陽生而啟聖惟彼降瑞因兹命氏曽祖貴隋太中大夫延州刺史凉國公皇朝封隴西公任切分憂寵加芳理朱旗映日皂蓋生風屬隋室道喪我唐天啟疇庸錫壤俾崇舊勲封以隴西昭其業也祖斌皇朝銀青光録大夫隰吉二州刺史襲封隴西公闕髙闕御下以寛洗幘清心不言而理襲封本郡昭其祚也父闕道皇金紫光禄大夫汾州刺史股肱之郡公輔之材克著政闕尤闕人望遷鎮軍大將軍左驍衛大將軍上柱國襲封隴西郡公武庫森森縱横矛㦸智囊闕風雲煥乎鈎陳設在蘭錡乃祖乃父自公自侯昭其貴也君衣冠奕世禮樂闕賢慶靄炳靈光昭茂大君有命人衛天和階闕呈祥仲由負三軍之勇燕頷標異班超封萬里之侯弱冠於清邊軍立功授遊擊將軍左衛長上明略經濟雄心英果尅清妖孽飲至天庭師出以臧功宜上賞朱紱斯曜可不偉歟無何轉授鄜州章州府右果毅時關内按察使强闕以君幹蠱奏攝㑹州司馬又改授同州洪泉府左果毅仍令長上一貴一賤喜愠不形於色或出或處寵辱無戒於懐位闕題輿闕申龎統名叅都尉闕屈曽洪有勅差充闕野軍副使舉不失德勤衣告勞展充國之務農輟揚雄之執㦸軍儲是給闕馬賴焉尋為太原節度使李暠奏授薛王府典軍蔽扞雄城趨侍闕每入招賢之觀時陪樂闕之遊習習雄風和而扇物粲粲闕寵而益闕青春始華𤣥夜秘景歳不我與天奪其運以開元十七年五月七日終於静恭私第春秋六十有二以其年六月十一日歸葬於萬年歳縣神禾舊原陪光塋禮也嗚呼哀哉賢王端憂故人啜泣垂天之翼必􅀈於紫霄經國之材俄辭於白日遂使瑶林瓊樹瘞松草於佳城龍章鳳姿沒風煙於闕嗣子闕庭等孝履増感攀號無訴恭陳道事俾刋豐石銘曰公侯之子兮累代其昌河岳之秀兮為龍為光克岐克嶷兮發言有章立功立事兮厥政其芳天何為兮連罹其殃哲人痿兮為代所傷飛旐翩翻兮出帝鄉素車逶遲兮西龍岡閉以大隧墐於便房勒勲鐘鼎畫像旗常日黯黯兮愁欲暮風蕭蕭兮悲白楊唐故江南西道觀察判官監察御史裏行太原王公墓誌銘并序撰許志雍公諱叔雅字元宏太原祁人也其先食采於祁因邑命氏軒蓋蟬聨奕葉闕茂忠貞孝友更不絶書素風懿範繼華紹烈誠有國之柱石為令族之領袖三代祖祐周驃騎大將軍開府儀同三司光禄卿隋拜司空兼中書令謚曰忠烈忠烈生皇朝比部郎中資州刺史師感公之髙祖也資州生朝請大夫澤王府司馬清源縣開國男守節公之曽祖也清源生渝州刺史贈懷州刺史闕一公之王父也懷州生金紫光禄大夫試秘書監兼御史中丞衢州刺史贈揚府大都督諱承俊公之先考也以中書之勲烈比部之令望清源之宏茂懷州之懿德中丞之雄邁世濟其美慶鍾後昆公即中丞第四子也弱不好弄幼而能文一見不忘有𩔖王充之敏五行俱下不慚應奉之才為善孜孜小心翼翼恭敬以奉上篤愛以臨下接士必盡其材修已不疵於物繇是鄉里挹其仁朋友伏其義時秘書郎嚴維有盛名於代雖以公年幼交契老成若蔡邕才重㧞王粲於弱齡李膺望崇歎孔融於稚齒嘉其至性敦重機闕深邃每器而厚之時擕幼弟適郢乃賦詩以贈云萬里天連水孤舟弟與兄時屬而和者連郡繼邑染簡飛翰朞月不息繇是聲華藉甚於公卿開郡舉進士纔及京師動目屈指傾蓋結轍為禮部侍郎劉太真深見知遇再舉而登甲科浹辰之間名振寰宇俄為山南東道嗣曹王臯辟為從事丁太夫人憂服闋調補右衛率府兵曹叅軍環衛望髙以優賢也未幾為嶺南連帥韋公丹舉列上分表遷左金吾衛兵曺叅軍蓮府才雄軍門瞻重每下徐􅐐之榻獨奪陳琳之筆屬本使節制東川府幙遂散邀公獨行奏遷廷尉評兼監察御史府公再遷慈晉俄領江西復隨鎮拜監察御史裏行以南康闕牧假行刺史事盡閭里之情袪疲苶之疾人得歸厚吏不敢欺歳月之間闕増闕復闕臨川闕南郡之理仁風所被清議攸彰無何寢疾經時沉痼以元和四年正月七日告終于洪州南昌縣之官舍春秋五十有五嗚呼哀哉以公之孝可以動神明以公之忠可以闕社稷以公之德可以反澆漓以公之仁可以厚風俗有一於此即為全人况其闕者乎奈何天不與善奪闕重器民不幸歟時不幸歟夫人河東薛氏故禮部侍郎闕元女族謂清門家稱令室以闕謙睦中外以端闕奉闕公以伉儷之重加於人一等如賔之敬禮若常林居家有恒情如顧涕由是時論多之有一男一女男曰高陽女曰呉婆皆在孩㓜哭無常聲公雖臨郡佐幕以清潔自約禄俸所入皆均親愛故不勝其貧轜車既還亦無以葬於時闕南西道連帥御史大夫章公丹以公賔四府始終如一感歎追舊情均支屬賻貲百金加以將校䕶喪聞者壯其高義以其年十月十三日歸窆京兆府咸陽縣之延陵鄉袝先塋禮也此志雍親同懿屬義比斷金見記斯文衘哀永歎銘曰汪汪王公德門之秀儒宗賢士茂族華胄忠為信臣義稱良友器逾瑚璉人推領袖何備其能不豐其壽嗚呼哀哉歳月云邁言歸鎬京綿厯舊遊想像襟情倐已終古閉於佳城蒼莽日落蕭颯風驚寒原故里丹旐新塋嗚呼哀哉盛德無窮傳今與昔閟於𤣥壤斵兹真石陵谷是遷令問不易泣下連洏氣塡胸臆嗚呼哀哉唐故銀青光禄大夫使持節蔚州諸軍事行蔚州刺史兼御史中丞馬公墓誌銘并序撰楊倞公諱紓字無畏扶風平陵人曽祖行琰媯州刺史祖于龍平州刺史父寔右驍騎將軍御史中丞並有功幽蘭書勲竹帛公即中丞苐廿五子幼有竒節性唯聰悟見古名將勲業之事未嘗不廢書發憤沈吟乆之闕寄河朔志蕃王室欲變風俗期乎坦夷遂委質戎府累遷魏大將自天寳末安史為亂雖克勦闕翻恣驕兇以故將帥帶州連郡蕃貢罕至而魏博諸田相繼立元和中上以文德武功定叛亂雖魏帥詐順尋亦如舊大和初滄帥李全畧死子同㨗盗襲其位光皇震怒徴兵討之魏帥以封壤連接潛相應援時中書令裴公掌兵柄謀撓魏事公以才辨為戎帥率知每有奏請獨當其任遂申宻欵於裴公天子嘉之乃大張皇威深述聖㫖開向國之福戒覆巢之厄帥立歸誠未幾王師大㨗而同㨗就戮萬夫解甲兩河肅清皆公始謀之力天子以公忠果可任大事拜左武衛將軍後出為寧州刺史在郡有聞堂帖赴闕拜右領軍大將軍至開成中博陵更師丞相進闕取可繼作者以蔚為闕隣闕易遷就乃拜公蔚州刺史兼御史中丞洎中謝文宗皇帝臨軒歎賞靣許重事以遣之既收安遷公綏戎以德撫下以恩野無南牧之虞俗講東里之禮三年去任執轅遮道者闕路蔚人思公令德日闕聞於廉帥廉帥聞於朝廷又拜蔚州刺史闕疾闕尋西河上聞之惻然候疾愈方授以大柄神不庇善以㑹昌四年三月十日終於所寄之第享年五十六嗚呼才長壽促志逺途窮闕廣所以為有識所歎公兩娶裴氏張氏皆名族生一男二女男補太廟齋郎娶徐氏次女適裴氏長女在室即以其年七月十日歸窆於關中少陵原袝其先塋合光妃之墓禮也銘曰皇道熈熈天寳末盗弄干戈正猖獗滄師死兮有餘枿魏為親隣志相活河海横流馬公遏溟盗亟誅天被闊忠義克彰遂聞達天子臨軒歎賢傑將委邊陲闕勲烈將分竹符後闕鉞所理蘇息無飢渇才有餘兮悲未豁長衢方騁椎輗軏彼蒼者天何謁謁嗚呼馬君道消歇中壽未登神奄絶唯有雄名流不竭大唐故太白禪師塔銘并序撰胡的禪師法號觀宗得姓留氏東陽人也世積貞隱𤣥冺不耀初母夫人夢吉祥天女引行摩利上宫而娠太白焉闕有善䕶懷刃不薫不腥肌窕為澤藏珠川媚藴玉方流至寳處而殊倫至人出而體别異香襲乎襁褓重顔清於氷雪太字進誘偏聫佛經滋味筵之但甘道素年至十二懇求出家如哀者欲淚不可遏也昔太字逾邁寧辭父去香烟頓騰擺落羈組乃登秦望山禮善惠禪師求無上法一見竒秀如會宿心舊從門堦新我堂室服勤左右道務精㣲初受楞伽思益等經便入禪宗性海然彼波瀾祕藏不習而了其功文字有窮生知莫際囊鉢衣裓遐求戒珠便徃南嶽禮闕空禪師稽首論心演通秘奥菩提樹上汝得新枝師於座前詎量髙下祖師傳教南北一十二人今牛頭山中禪師是最後者逺將啟暴研復眞言以心印心以法印法法且無别心寧有差夫人善無修頓了無入二際情浄佛何間然禪師皃出常倫挺秀八尺時牛頭法衆欲近萬人無礙辨才闕瞻仰彼土縁盡思歸太白上方務安静也不游京國遠名利也扃不開楗示無畏也常有兩虎依卧庵前伭目輕歩馴於家畜西境之内不聞暴聲我藴大慈力感羣物諸毒皆善豈唯獸焉山雖高深不能隱其大德逺近禮謁如川之流故明州刺史王公術故明州刺史李公岑故劔南東川節度行軍司馬檢校户部郎中任公侗故明州刺史盧公雪前後昏駭騎雲根稽求上法飢渇無量實徃貲歸每有異香聞者非一嗚呼孰謂法梁將壊般若舟沉光和四年八月十五夜跏趺化滅享齡七十九僧臘卅九以其年十月一日權閉於太白峯南先意也州尊邑尹祭奠交衢緇素齊道幢幡翳野慈雲聚而還散定水咽而更流猿鳥悲吟聲慘風雨物感如此人哀可知抵元和乙未歳建層龕邇於多寳佛塔依法像也門人闕每法常道真明徹惠見光獻𤣥㣲清瑗𤣥悟等皆承師教戒定慧雙修恐刼大重愈嵐風碎岳請銘大德於無朽文曰如來示滅教留袐法言說非𫝊清浄即合大鏡陽照山空響答其一真乘無相妙覺無形三界上界前生下生丹虧魄隱冰津流清共之香塔徒傷有情唐故馮府君墓誌銘并序名闕撰人府君諱倫字寰周長樂人也曽祖思祖琰父璋俱養性邱園髙尚不仕府君即璋第二子幼而簡約長而宏雅恬然自處不趨世利禮則凝重器宇沉深雖榮之與辱不能動其色忘言得意忻忻如也輕財重義博識多能理性内融徽猷外發男公造立身恭謹色養兢兢二女令淑有聞各娉他室嗚呼斯人不保遐壽少乖攝衛伏枕彌旬藥術無徴奄隨風燭以大和十年八月一日終於私第享年七十府君殄也隂雲暗慘鳥雀悲鳴至理𤣥㣲天何可問男女迷謬叩地號天閭巷傷聞為之慜然夫人陳氏蓬首灰心沆哀骨立徒想瓊田之草無復返魂之香以其年十月十五日葬於江夏長樂鄉射亭里之原禮也北背黄鶴之嶺南瞻八闕之峰恐年代侵疎川原變易剋石記事永將不易辭曰日月至明尚有盈缺丘山至壯尚有崩裂感彼馮君隨波生滅時惟孟冬祈祈悲風凝隂蔽野苦霧霾空敬勒斯志千載無窮大唐故汝南公主墓誌銘并序名闕撰人公主諱字隴西狄道人皇帝之第三女也天潢疏潤圎折浮夜光之采若木分暉禯華照朝陽之色故能聰頴外發閑明内映訓範生知尚觀箴於女史言容成則猶習禮於公宫至於怡色就養佩帉晨省敬愛兼極左右無方加以學殫綈素藝兼鞶紩令問芳猷儀形閨閫某年某月有詔封汝南郡公主錫重珪瑞禮崇湯沭車服徽章事優前典屬九地絶維四星潛曜毁瘠載形哀號過禮繭纊不襲堛酪無茲灰琯亟移陵塋浸逺雖容服外變而沉憂内結不勝孺慕之哀遂滅傷生之性天道祐仁義其㝠漠以合貞觀十年十一月丁亥朔十六日故祭酒崔十八文綽常與冠章賀拔惎皆以鍳閱相尋每稱伏膺虞書多所厯年自㑹昌以來時覩斯帖因致其真𨽻有加頃年崔丈每送余弟兄下第東歸必云此去獲見汝南帖其何减於昇第耶所惜者闕其銘文耳咸通二年春於存神室輟獻於凝良足濇愛也幾𤣥闕虞書世所傳者孔廟記耳此帖遂可抗行河東薛紹彭題唐故處士潁川陳氏公墓誌銘并序撰李乂陳公諱韞字韜光西漢太邱長寔之逺裔也曽祖晏祖闕先父澄偕髙蹈不仕浪跡人寰以處黙為輪輿以軒冕為桎梏教垂嗣𦙍德冠我公作隱遯股肱為闕山浚峭峻義方而闕屬不間宏心計而資給豐饒闕用身安降年有永故春秋七十有八矣所宜溢斯上壽闕有中庸誰謂劔沒延津珠貽淮水以唐開成三年二月二十七日寢疾於江闕縣之私室闕年四月七日歸袝於順化里黄闕塋禮也夫人譙郡曹氏先公三祀而卒子闕立闕瘠綿頓幾不勝哀服懃經營靣垢闕有禮號慟而行路無聊仁孝光闕以闕父闕二闕滎陽潘氏婦儀母道自彼抑揚豈不性闕㳂闕有自於戲言猶在耳昔容已緘哀闕臨岐誰無怨闕又以曽䕃德宇忝識前修實録道芳刻於貞石銘曰闕德門所嗣兮退藏是先名與身孰親兮道在保全福壽所資兮天降永年遺芳不替而蒸蒸又闕兮闕前大唐扶風馬氏墓誌銘并序名闕撰人廿三娘馬氏名姹扶風人也故侍中太原尹子曽王父故太子諭徳兼兵部郎中子之王父故鄂州州從事子之先父也子生於珥貂之家育在紈綺之室笄年廿歳灼如蕣英期偶適耀闕我後嗣何華而不實祉福不臨以元和八年七月三日洪水忽來浸隘夏汭合郭為患顧比闕遂假官航以虞闕江夏縣縁果道塲七層塼塔下舍利銘記闕撰人名闕設大齋闕朝爰洎遐邇設使芬盡方闕忘議善乃為銘曰茫茫宇宙悠悠世間九地衘海四闕山三塗有獄五道無關闕識闕循還至聖何像嶷爾惔怕示現無方迦維垂迹等救燒闕息衆𣙜城椎輪火宅八十化盡天人䘮師撫膺雨涙香水闕八國均持機縁靡隔靈祥俟時坊墳式建層表臨空非因闕金盤仰露寳鐸揺風山移川徙徽業興隆唐故寧逺將軍守左金吾衛大將軍隴西李公墓誌銘并序撰李藝夫為淳源支流一𣲖後楫先軓者蓋紐宗子相襲焉由是士闕時望扄扇和風昔附闕獨於前聞也公諱宗卿字同系臨汝郡人曽祖蘭州刺史曰闕州龍遊縣闕瑱考朝議郎泗州虹縣尉援本以敦序闕時衣冠及位公道亮取時宏性測初勵躬祗廙克事闕難濟國操節侔搢拖義為紳常以顯闕隱闕進㑹於道並泰則何宦而闕自董武崇階總兵闕門闕宗族處朝襄交在位隟伺内薦冀乎闕公植其風忽遺其命也時貞元十三年歳次闕夏口官舍嗚呼春秋六十有二夫人汲郡康氏毁躬闕長子德方次子直方宏方季子㓜方等主奠號天哀闕河南元氏先公之淪次女十六娘已許於天水趙氏㓜女十闕茹泣貫心闕於闕月十一日權闕禮也於戯修幹挺空而見摧君子不幸於闕生誠藝通忝殊眷孟伯之子恭命為詞杳杳邃氣闕顧巖作度闕其一噫云夢奠倐歎頺闕代闕馳闕彰其二曙興神輦告赴原塋却負闕哀闕至情其三闕妃墓誌銘尚書右僕射太子詹事臣勉奉勅撰永陽太太妃王氏琅琊臨沂人也其先周靈王之後自秦漢逮於晉宋世載光闕羽儀相屬既以備於前志故可得而畧焉祖粹給事黄門侍郎父儼左將軍司馬尋陽内史並見稱時輩太妃體中和闕宗之烈蹈此温恭表茲淑愼孝敬資於㝠發仁愛闕於自然至乎四教六訓之閑工言貞婉之德無待闕該備故景行著於中闕淑問顯乎言歸作嬪盛德實光輔佐闕勤及早世嫠居遺孤載藐提擕撫育逮乎成闕洽劬勞必盡曽不移忘用能緝睦於中外闕節曹妃之敬讓方之蔑如也皇業有造殷闕纂嗣蕃號式顯廼拜為太妃策曰維天闕帝遣宗室員外散騎侍郎持節兼散騎闕為國太妃曰於戯惟爾茂德内湛闕用式遵舊典載章徽服徃欽哉肅茲休烈可不慎歟闕約居千乘闕厚既而恭王不永禮從闕年髙事重志氣方隆宜永綏福履而奄奪闕一月九日己夘薨於第春秋五十有闕摧切割不能自勝便闕可給東園闕辰式宏茂典又詔曰故永陽太太妃闕式盛母儀即逺戒期悲懷抽割可詳典故闕八日戊戌祔瘞於琅耶臨沂縣長千里黄鵠山用宣風闕銘曰清瀾悠邈其儀闕世祀猗歟罔匱於昭不已誕資仁淑作嬪君子幽閑表闕處薄秉黙居冲叅差採芼揜映言工鑒昭彤管識懋休風凝芬載湛芳闕徙舍為訓止閭成則曹號母儀豈伊婦德穆茲閨閫形於邦國龍飛集運禮數攸鍾憲章盛典車服有容泰而愈約貴則彌恭蕃祉方茂纂嗣克重巾帚差池朝夕闕事雖曰任𫝊永請斯備是惟仁姑厥德竒庇恂恂濟濟蘭芬闕光隂易晚祺福難留閨儀罷映褕華奄收奠遷朱邸駕指行楸芳闕是勒大闕方攸前陳伏波將軍驃騎府諮議叅軍陳府君墓誌序周彪撰君諱詡字孟和潁川許昌人也鴻基浚序有虞之苗闕若夫姚墟誕聖嬀汭降神四門穆穆八表光禪啇均不嗣周智胡公封建於陳因闕命氏鴻闕方榮書魏冊㣲壬季闕先賢自下蟬聨並闕言史祖僧亮神情淡逺素氣髙竒齊闕父闕風儀峻整雅有闕至前梁儀同君幼而聰敏長闕九部懸梁刺服手不釋書天才儁拔思若有闕包之筆江淹用之闕王充五行俱下都闕重起家為岳陽王雍州西曹轉府記闕都督衛州東征王師失律軍潰䧟陳同旅督闕陳王曇頊初秉朝政虐於國威縱情好闕於刑所附啟自陳蒙答貰死漏刃獲生俄而釋禁闕波將軍俄遷驃騎府諮議闕國云亡總管秦王招闕厚過辭者還鄉第二息孝闕昆季男女乆違膝下忽奉闕如從天落相率闕日膳常珍則闕九闕何曽百品闕也同畢卓之闕放闕遣有識假歸眞所製闕秦始之髙墳是王孫之闕葬乃遺命送終唯令儉薄不許立銘開皇二十九年九月二十四日卒於檀溪里時年七十六五男五女男則孝悌著聞居喪過禮女則柔和顯稱婉娩聽從以其闕十二月丙辰朔十八日癸酉歸葬髙陽鄉碑隂君第二叔爽字寳明州祭酒從事第三叔子暢字彦舒法曹從事第五叔彦薳字祥敷梁鎮北府法曹叅軍使持節驃騎大將軍開府儀同三司闕江闕第二弟闕字仲厚第三弟闕字季辨闕孝騫所生李夫人長息孝柴早亡第二息孝騫字裕閔第三息君卿字闕苐四息曜闕第五息五敏字稚文第六息思岵字幼集長女禮閨適梁故儀同郭仲方息元預第二女藏閨適陽平郡守大都西門忠息瑱第三女敏閨第四女四閨第五女善才君妻琅瑯諸葛氏宋張氏墓誌闕撰人名宋故臨渭縣侯湘東太守張府君諱濟夫人邱氏諱静姬第三女推兒春秋卅有一亡於偏憂元徽元年十月甲辰十七日庚申權假窀穸於四鄉逺葉蘭飛浚源璇漯履順甲辰含章抄闕選史圖容循詩範節皎鏡冬泉優柔春蕙闕北闕行營東慙藝闕昧慶善窅翳壽仁泣血霣性團憂殱身罷景方旦摧華載春壠木已藹墓草行陳朱火幾爓𤣥夜無晨唐徐氏山口碣石題刻徐浩撰至徳二年上在鳳翔應制扈從闕中書門下闕上各贈父祖一人官闕任中書舍人兼尚書右丞集賢殿學士正月二十八日制贈公尚書吏部侍郎及上還京廣德元年八月二十一日制復贈公嗣子故銀青光禄大夫洺州刺史上柱國嶠之左散騎常侍洺州府君厯典趙衢豫吉湖洺六州開元二十四年薨𦵏於洛陽石橋東北十里浩自吏部侍郎貶明州别駕歸鄉拜掃換山口碣石題此額篆唐故東莞臧君夫人周氏墓誌銘張師素撰夫人姓周氏其族望本乎汝南今為陽羡中江里人也祖莊父俊皆不尚名宦抗跡邱園孝弟謙恭仁行昭著夫人淑愼貞賢温柔令範自禮歸臧氏之室而琴瑟叶和遵孟氏之風規有班家之令譽嗚呼𤣥穹降禍大夢忽臻未偕知命之年奄促泉臺之痛以元和十三年歳在戊戌三月四日終於義興平西里之私第享齡四十有四亦以其月甲申廿六日己酉安厝於中江血瀆東北之平原周氏祖業之圓地蓋從龜筮也有子曰奉言始童丱有女二人長未及笄俱號訴之無依憾慈容之永隔恐桑田變易陵谷傾頺故勒紀貞石乃為銘云雙劔光芒兮嗟一沉鳳歸杳㝠兮鸞孤吟撫稚子兮淚盈襟悲壠樹兮愁雲深唐朝請大夫試絳州長史上柱國趙郡李君故夫人京兆杜氏墓誌銘闕撰人名夫人諱瓊字瓊本京兆杜陵人後因家邢州遂為邢之堯山人焉曽祖知愼皇將仕郎守冀州南宫縣尉祖昌運皇守忻州定襄府左果毅上柱國父西巖皇朝散大夫試左武衛長史夫人長史之叔女也笄年歸於李君明正清劭輔以材能落落焉有賢傑之操門闕李君隨牒襄陽夫人亦來漢上宣猷與夫人别業接連得叙宗族日漸月深情同密親始子隨進士貢路出漢濵時寓夫人里第稅駕之後徒馭如歸開顔拂闕主禮甚渥李君賢厚少事以儒書自適門内之治實夫人主之其奉夫也以敬其訓子也以義其睦親也以誠其接下也以德吹惠布明家政煥然舉如是言雖賢丈夫何以過也嗚呼材智方逺光景不借以大和五年十二月三十日薨於襄州旌孝里之私第春秋六十五明年十月十一日安厝於襄陽縣習他鄉之西把里夫人生二女二男長女適太原王儀次女適扶風馬寧長男德𤣥次男德章德𤣥㓜奉擇鄰之訓明經擢第釋褐隨縣尉德章休休然亦以詩禮充業今則泣血崩心若無所容先逺有期託予誌德濡毫寫悲不羞不能銘曰杜氏之先陶唐同源逺𣲖揺漾為傑為賢夫人體之令範昭然身同朝露門閉幽泉德本寺碑隂闕撰人名晉杜氏集解春秋其有關於魯史者附為後序今建莊之始即居士徐君導之置也以徐君有善亦剞之於石也君世居寺之後石橋橋路多墊溺乃議於隣之左立君曰榮謂開通道路儒釋共緒欲展其利必無其跡况為鄉邑徃返之大利哉大和六年春自前石橋趣後石橋達於所止凡一百四十五歩涿淩雲之石鎭積虗之土條堅質以界道較繩墨為地靣功成也有若梅天㴻雨同落澗而驟傾臘雪凝冰等髙岡而益固則智起二人跡垂永躅嬪吳氏墓銘胡季良撰闕標於史冊關雎著於詩首即闕一貫也安君令嬪渤海呉氏闕儒奉道為鄉閭之令望以夫人闕女長為孝婦闕於嚴母令之也吉人為善惟日不足以大和九年闕五日終於烏程縣苕臨郷之私第年五十有三比盛年則非夭折闕痛青春即以其年五月二十八日闕霅水鄉仁王寺之西安君感其闕遵蒸祀買石誌德紀之闕子曰師敏承闕保終於禮也君闕文以闕詞曰仁王山兮寺西園孤墳寂寂兮閇闕婦德兮黯黯孤魂平生義闕石誌言唐故越州衙前總管杜府君墓誌銘山隂沙門東乂撰府君諱闕其先闕乎闕詩曽祖闕祖珍名宦不敘欲略故也府君氣宇英明風神雄大闕門之緒且時從闕傑闕展伏波早世天命闕賢良所嗟太和三年三月二十六日私第而故享齡六十以其年四月二十四日卜闕於山隂承務鄉九里村馬闕之地宅兆之禮也夫人李氏元和十二年四月二日先夫而終内則令範可傳女史今合袝墳塋盖琴瑟榮枯嗣子師素弓裘克繼泣血茹闕哀號事喪岵瞻屺瞻闕雷在闕風悲拱木月闕佳城恐山谷遷變勒銘萬古詞曰府君之生林闕禄位文武猗歟令名天命何欺遽違人世喪親怙恃窀穸俄闕哀孤孝子荼毒肝腸奉柩扶䕶合𦵏龍岡松柏新栽風光萬古佳城異代刻石泉户唐王府君墓誌銘戴仁而處抱義而行者即瑯琊王府君公諱仕倫字文逈其先晉右軍十闕代孫也曽祖璆皇祖思皇考良忠貞不仕公春秋五十有七以大和九年六月二十二日終於暨陽之私第嗣子宗志次子劉老稚年荼毒泣血絶漿以當年八月二十九日葬於故朱夫人之同塋所也山連藥王之岡地闕建興之壟且離城郭不逾一里去人煙十步有餘焉恐山川遷變乃刋石為銘賢哉哲人抑抑秩秩無嗜輕恌好求之質云何積善而遘斯疾悲古青松哀辭白日萬古千秋於焉永吉唐故鳳光寺俊禪和上之墓銘闕撰人名和上諱常俊俗姓張氏清河人也皇祖莊皇考李即李之第二子丱歳出家年齡七十僧夏冊奄自㑹昌元年五月十五日示疾歿即以其月廿六日遷柩於常州無錫縣太平鄉闕村東一里官河西八十歩張宗祖墓中卜其宅兆庚首而安厝之禮也有門人文則𤣥通伯昌俗兄秀姪令客等悲痛哀摧涕淚交結恐陵谷遷改桑田變移塋域無徴乃刋磚而為誌銘曰禪宗内緼法印心闕棄浮生歸乎寂滅唐故許氏夫人祈氏墓誌李師聖撰夫人字芳太原人也先伊耆氏之胄封爵列位皆附舊史故隱顯不言因逺祖居毗陵今為毗陵人也祖觀父昇並髙尚雲林獨立不懼積慶儲趾是生夫人夫人即昇之長女也年始初笄歸於許氏輔佐君子協和中外其儀可範其德可大貞順模於九族婉娩美於當代嗚呼上天而假其德不假其永世之壽是足可悲以貞元廿年七月三日寢疾卒於闕孝鄉唐昌里之私第春秋五十有二以貞元廿一年孟春月三日安厝於震澤里之原禮也夫人生二子長仲宣次仲康並哀疚悚心窮號泣血懼山谷之遷變乃勒刻石而爲銘振振夫人有德有操積為善慶自己所蹈彼蒼何偏而不斯報闕吉永閇荒闕二子泣血罔極昊天慮日月之闕遷乃刻銘於墓前唐賈水部墓誌額唐故朗州武陵縣令博陵瞿府君墓誌銘闕撰人名府君諱令圭其先本博陵越人也蓋帝嚳之末裔闕晉永嘉二年遷於南楚曽祖詮皇長沙縣令大父闕軍考日智皇國子助教纂承儒業闕向二百年闕夫人南陽張氏世傳冠蓋奕葉簪纓府君則國子監助教第二子㓜而孤夫闕弟更相誨訓未嘗住師闕業成各登闕第府君以闕解褐曹州葉氏縣闕仕標闕邑闕元年遷硤刑長闕百里稱賢頌闕大厯闕安州雲夢守節奉法猾吏秉心貞元授朗州武陵去獸逾闕逋亡闕從官四任闕政大夫以闕字人闕稱其善公庭訟息闕館闕愼始令終府闕武陵記秩廿八載守道闕仕何圖皇天不弔降此哀禍嗚呼𤣥闕何昧闕材賢時貞元十二年龍集闕子三月遘疾七月庚寅闕於闕縣私第夫人廣平程氏令淑有聞威儀紃紐敬事闕先始闕以大厯年先府君而終府君享年七十有八有子三人長曰倗官至左衛兵曹叅軍次子任鄂州武昌府尉少曰佋闕州闕縣尉孤子倗等闕荼涙血號訴聞天視庭户而蕭條覩空堂而寂寞長幼孤露一門無恃以其年十月四日遇青闕之吉歸袝於鄂州江夏縣長樂鄉順化里黄鶴西山之原禮也孤子倗散闕亂闕號泣請銘謹以為誌銘曰於戲闕著則其一積善於家肅穆清華其二克儉克勤榮禄闕親其三四從厯闕一門承䕃其四天道何昧降斯灾害其五神道胡欺遘此禍其六冀闕眉壽皇天不祐其七庭闈蕭索蒼其十惟晉元康二年太歳在子承開造斯穾窕丙户闕出西左叅師圖合宫啇是位龜筮易闕咸闕同吾􅀈爵除殞邪惡奔走千禄百福永施後焉漢永初討羌檄永初二年六月丁未朔二十日丙寅得車騎將軍幕府文書上郡屬國都尉二千石守丞廷義縣令三水十月丁未到府受印綬發矢討畔羌急急如律令右宣和中陜右人發地得木簡一瓮字皆章草朽敗不可詮次唯此檄完中貴人梁師成得之嘗以入石永幾梁卒石簡俱亡故見者殊鮮呉思道親覩梁簡故賦其秘古堂云異錦于囊更妙好中有玉奩藏漢草榮次新呉出也得其橅本以示余按章草今在世益少唯急就章見在并諸帖所傳耳然急就轉橅失眞愈逺官帖章帝皇象索靖等書與張芸叟所珍鷂爵賦又率是􅎓作黄長叡已嘗辨於東觀餘論然則此檄當為今章草家第一也米元章淮鱗帖卷内稱章草乃章奏之章今攷之既用於檄則理容概施於章奏豈小學流家由古以降日趨於簡便故大篆變小篆小篆變𨽻比其久也復以𨽻為繁則章奏文移悉以章草從事亦自然之勢故雖曰草而𨽻筆仍存良由去𨽻未逺故也右軍作草猶是其典刑故不務為冗筆逮張旭懷素輩出則此法掃地矣但檄言討羌歳月與史不合此史誤無疑黄長叡已詳辨不復述乾道庚寅孟秋中休命工鋟版因識其後陽羡張駒書石佛識齊永明二年甲子太歳甲子四月廿日弟子紀德眞為亡弟僧惠敬造釋迦石像追徃悼心泣深反愛願僧惠齊神離苦永與福㑹七世亡靈同生净土見在眷屬長保吉闕家門雍睦子孫昌熾願願果遂享善無窮闕使蜀于涪陵喪思寺就頴法師造題名張公洞璧記楊漢公陶揆長慶四年六月二十六日又東坡居士自黄適汝艤舟亭下半月矣江山之樂傾想平生時與闕德闕元豐七年七月十四日蘇子瞻題又前檢校户部郎中兼興元少尹攝御史中丞賜紫金魚袋楊漢公嶺南觀察推官試祕書省校書郎鄭薫又臨川王旁登于佛闕去東林峯頭不住起孤煙池上相留有白蓮塵網分明知束縛要須騎馬别雲泉㑹昌三年七月十三日袐書省正字曹汾題此詩在曇玼碑隂塵土昏塞無知之者至和三年春二月陳國袁陟來遊山徧扶竒迹始發其晦東林詩多矣未有如此篇之意完而美者因題以永之汾開成四年崔蠡下進士後為中書舎人户部侍郎忠武軍節度使實丞相確之弟也又題山泉云可致清川廣難量利物功㳙流此山下誰識去無窮大和九年京路馬駸駸塵勞日向深蒙泉聊息駕可以洗君心寳厯二年四月沈𫝊師又五言寳林寺作會稽公徐浩茲山昔飛來逺自琅耶䑓孤岫龜形在深泉鱘井開越王屢登陟何相傳詞才塔廟崇其顛規模稱壯哉禅室清溽潤髙閣無恢炱照曜珠吐月鏗轟鍾隱雷揆余乆纓弁末路遭邅回一棄滄海曲六年稽嶺隈逝川惜東駛馳景憐西頺􅆎𢃄愁疾减容顔衰悴摧賴居茲寺中法士多瓌能洗心聽經論禮足蠲凶灾永願依勝侣清江乗度杯謁禹廟一首畎澮敷四海川源滌九州闕𤣥圭錫乃建洪疇鼎革固天啟運興匪人謀肇闕宅土闕永庇昏闕山足靈廟在闕前清鏡流象筵陳玉帛容衛闕戈矛探穴圖書朽卑宫堂殿修梅梁今不壞松柘古仍留負責故鄉近朅來申爼羞為魚知造化闕仰徽猷不復問夏樂唯餘秦楚幽婆娑非舞羽鏜鎝異鳴球盛德吾無間髙功誰與儔災涯破山慝祚聖擁神休出谷鸎初語空山猿獨愁春暉生草樹栁色曘汀洲恩貸題輿重榮殊衣錦遊宦情同械繫生理任桴浮地極臨滄海天遥過斗牛精誠如可諒他日寄冥摉二詩舊以一石反覆刻之為好事者持歸京師今在宣獻宋公家僕領浙東從次道得刻本命華史摹傳留寘郡齋然亦不能盡得其眞熈寧己酉秋七月辛未精思堂西軒題王濛帖濛死罪諸葛僕射之弟以情料之當非至困者欲歛其時吏無一在者便以下官牋答之濛死罪鍾繇帖戎路兼行履險冒寒臣以無任不獲扈從仚佇懸情無有寧舍傅方反覆胡脩背恩天道禍滛不終厥命建平五年六月郫五官㑰范功平史石工􅌛徒要本長廿五文賈二百五千闕唐故陸氏劉夫人墓誌銘并序名闕撰人夫人彭城郡人也父峯皆詞林學趨官迹立笄年禮聘適於陸門盥帨雞鳴嚴勤婦節大期俄届嗚呼於大中九年七月闕日寢疾終於華亭邑内之私室也芳年四有七以其十一月一日葬於縣東三里買宋氏地之新塋禮也有子三人長度次夫師闕師雖以幼童哀訴過禮恐代異時移故刋貞石銘曰夫人劉氏簮纓之女節婦義夫早聞令譽隟光西邁逝水東流佳城一閉萬古千秋題名昔漢丞相蕭何邀淮隂公韓信至此山又前溧水縣令鄭宗道開成三年六月罷官上州禮辭迴遊此十一日記又朝散大夫守成都少尹上柱國李拜大中十一年十二月十三日獨遊司顥掌書記試大理評事盧知猷觀察推官試太常寺協律郎徐彦闕安撫巡官試秘書省校書郎崔蔚攝觀察巡官前鄉貢進士薛邁咸通四年九月三日同謁先師詩刻元自五十年前遊天台宿建公院登華項攀琪樹觀石橋之險絶􅃡懷昔遊因為絶句上都左街保壽寺文章應制天生石月架空虚樹綴龍髯子貫珠五十年前已攀折建公曽到上方無奉和并書撰王謩華亭髙峯接太虚承攀琪樹賦垂珠當時惟有建公在老宿如今一半無唐大中九年嵗次乙亥八月丁丑六日壬午重題以紀他年之事故天水姜夫人誌銘大唐故駙馬都尉天水姜慶初女適故殿中侍御史劉元質享年七十三於開成三年十月一日終於鄂州私第以其年十二月二十一日權厝黄鶴山南原禮也懼陵谷之多變故為斯銘用紀悠久之祀誌蓋題云新平公主女姜夫人墓古刻叢鈔
